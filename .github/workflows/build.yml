name: CI

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: "/opt/termux/android-sdk"
      NDK: "/opt/termux/android-ndk"

    strategy:
      matrix:
        target_arch: [x86_64, aarch64, arm, i686]

    steps:
      - uses: actions/checkout@v4

      - name: Clone
        run: git clone https://github.com/termux/termux-packages.git

      - name: Add proot-portable package
        run: |
          mkdir termux-packages/packages/proot-portable
          cat > termux-packages/packages/proot-portable/build.sh << 'EOF'
          TERMUX_PKG_HOMEPAGE=https://github.com/proot-me/proot
          TERMUX_PKG_DESCRIPTION="emulate chroot, bind mount and binfmt_misc for non-root users (portable build)"
          TERMUX_PKG_LICENSE="GPL-2.0"
          TERMUX_PKG_MAINTAINER="@termux"
          TERMUX_PKG_VERSION=5.3.1
          TERMUX_PKG_REVISION=1
          TERMUX_PKG_SRCURL=https://github.com/proot-me/proot/archive/v${TERMUX_PKG_VERSION}.tar.gz
          TERMUX_PKG_SHA256=1fd8a3d92b04c51c92e36ede4b0b53f4e1e7a84e8f9e9bdd6e0a4d36e239cd65
          TERMUX_PKG_DEPENDS="libtalloc"
          TERMUX_PKG_BUILD_IN_SRC=true

          termux_step_pre_configure() {
            sed -i 's/0x600000000000/0x400000000000/g' GNUmakefile
          }
          EOF

      - name: Build proot-${{ matrix.target_arch }}
        working-directory: ./termux-packages
        run: |
          # Fix permissions: Allow write access for any user (Docker container)
          sudo chmod -R 777 .
          
          # Run the build
          ./scripts/run-docker.sh ./build-package.sh -a ${{ matrix.target_arch }} -I proot-portable

      - name: Upload proot-${{ matrix.target_arch }}
        uses: actions/upload-artifact@v4
        with:
          name: proot-${{ matrix.target_arch }}
          path: termux-packages/proot

  pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make dirs
        working-directory: public
        run: mkdir x86_64 aarch64 armv7 x86

      - uses: actions/download-artifact@v4
        with: { name: proot-x86_64, path: public/x86_64 }

      - uses: actions/download-artifact@v4
        with: { name: proot-aarch64, path: public/aarch64 }

      - uses: actions/download-artifact@v4
        with: { name: proot-arm, path: public/armv7 }

      - uses: actions/download-artifact@v4
        with: { name: proot-i686, path: public/x86 }

      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: public
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
